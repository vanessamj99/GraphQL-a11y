directive @a11yLabel(field: String!) on OBJECT | FIELD_DEFINITION
directive @a11yRole(role: A11yRole!) on OBJECT
directive @a11yToken(
  type: String!
  field: String!
  priority: Int = 0,
  label: String,
  labelPosition: String,
  unitPrefix: String,
  unitSuffix: String,
  number: Boolean
) on FIELD_DEFINITION

directive @a11yTemplate(summary: String) on OBJECT

enum A11yRole {
  GROUP
  BUTTON
  LINK
  IMAGE
  STATUS
  ALERT
}

type A11yToken {
  type: String!
  value: String!
  priority: Int!
}

type A11yTemplates {
  summary: String
}

type A11y {
  label: String!
  role: A11yRole
  tokens: [A11yToken!]!
  templates: A11yTemplates
}

type Movie
  @a11yRole(role: GROUP)
  @a11yTemplate(summary: "{title}, {rating}, {year}.") {
  id: ID!
  title: String!
    @a11yLabel(field: "title")
    @a11yToken(type: "title", field: "title", priority: 0, labelPosition: "none")
  releaseYear: Int
    @a11yToken(
      type: "year"
      field: "releaseYear"
      priority: 2
      label: "released in"
      labelPosition: "before"
      number: false
    )
  rating: Float
    @a11yToken(type: "rating", field: "rating", priority: 1, label: "rated", labelPosition: "before", unitSuffix: " out of 10", number: true)
  a11y: A11y!
}

type Query {
  movies: [Movie!]!
}

name: a11y-contract

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  schema-contract:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run schema contract check
        run: npm run check:contract
